<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>地球股東會｜ESG 分析平台</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/base.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/home.css') }}">
</head>

<body>

    <!-- 第一頁：主視覺區 -->
    <section class="hero-section">
        <div class="hero-overlay"></div>

        <div class="hero-content">
            <button class="scroll-btn" onclick="scrollToModels()">
                向下探索
                <span>⌄</span>
            </button>
        </div>
    </section>


    <!-- 第二區塊：模型選擇區 -->
    <section id="model-section" class="model-section">

        <div class="section-title">
            <h2>選擇分析模型</h2>
            <p>請選擇你想使用的 ESG 分析功能</p>
        </div>

        <div class="model-card-container">

            <!-- 第一區：永續報告書漂綠偵測 -->
            <div class="model-card" onclick="goToPage('/greenwashing')">
                <div class="card-icon">🌱</div>
                <h3>永續報告書漂綠偵測</h3>
                <p>
                    上傳或輸入企業永續報告書內容，
                    系統將分析可能的漂綠風險分數，並說明判斷原因。
                </p>
                <button>進入分析</button>
            </div>

            <!-- 第二區：線性預測 ESG -->
            <div class="model-card" onclick="goToPage('/linear-esg')">
                <div class="card-icon">📈</div>
                <h3>線性預測 ESG</h3>
                <p>
                    使用線性回歸模型分析 ESG 分數與企業財務表現之間的關係。
                </p>
                <button>進入模型</button>
            </div>

            <!-- 第三區：機器學習預測 -->
            <div class="model-card" onclick="goToPage('/ml-prediction')">
                <div class="card-icon">🤖</div>
                <h3>機器學習預測</h3>
                <p>
                    使用 Random Forest、XGBoost 等機器學習模型，
                    預測企業未來 ESG 或財務風險。
                </p>
                <button>進入預測</button>
            </div>

        </div>

    </section>


    <!-- Footer -->
    <footer class="footer">
        <p>參考資料</p>
        <a href="https://esggenplus.twse.com.tw/inquiry/report?lang=zh-TW" target="_blank">
            永續報告書入口網頁
        </a>
    </footer>


    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
