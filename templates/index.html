<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>地球股東會｜ESG 分析平台</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/base.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/home.css') }}">
</head>

<body>

    <nav class="site-menu" aria-label="主選單">
        <button class="hamburger-btn" type="button" aria-label="開啟選單" aria-expanded="false" aria-controls="home-dropdown-menu">
            <span></span>
            <span></span>
            <span></span>
        </button>

        <div id="home-dropdown-menu" class="dropdown-menu">
            <a href="/">首頁</a>
            <a href="/greenwashing">永續</a>
            <a href="/ml-prediction">機器學習</a>
            <a href="/usage">網頁使用說明</a>
            <a href="/about">關於我們</a>
            <a href="/links">相關連結</a>
        </div>
    </nav>

    <!-- 第一頁：主視覺區 -->
    <section class="hero-section">
        <div class="hero-overlay"></div>

        <div class="hero-content">
            <button class="scroll-btn" onclick="scrollToModels()">
                向下探索
                <span>⌄</span>
            </button>
        </div>
    </section>


    <!-- 第二區塊：模型選擇區 -->
    <section id="model-section" class="model-section">

        <div class="section-title">
            <h2>選擇分析模型</h2>
            <p>請選擇你想使用的 ESG 分析功能</p>
        </div>

        <div class="model-card-container">

            <!-- 第一區：永續報告書漂綠偵測 -->
            <div class="model-card" onclick="goToPage('/greenwashing')">
                <div class="card-icon">🌱</div>
                <h3>永續報告書漂綠偵測</h3>
                <p>
                    上傳或輸入企業永續報告書內容，
                    系統將分析可能的漂綠風險分數，並說明判斷原因。
                </p>
                <button>進入分析</button>
            </div>

            <!-- 第二區：機器學習企業分析 -->
            <div class="model-card" onclick="goToPage('/ml-prediction')">
                <div class="card-icon">🤖</div>
                <h3>機器學習企業分析</h3>
                <p>
                    輸入 ESG 與財務資料，一次產生 ROA 預測、財務風險、
                    公司分群與漂綠警訊。
                </p>
                <button>開始分析</button>
            </div>

            <!-- 第三區：成果儀表板 -->
            <div class="model-card" onclick="goToPage('/dashboard')">
                <div class="card-icon">📊</div>
                <h3>模型成果儀表板</h3>
                <p>
                    展示訓練模型比較、最佳模型、特徵重要度、描述統計與線性係數，
                </p>
                <button>查看成果</button>
            </div>

        </div>

    </section>


    <!-- Footer -->
    <footer class="footer">
        <p>參考資料</p>
        <a href="https://esggenplus.twse.com.tw/inquiry/report?lang=zh-TW" target="_blank">
            ESG數位平台
        </a>
        <a href="https://tejpro.tej.com.tw/SchoolDoc/TEJ/?lang=zh-TW" target="_blank">
            TEJ Pro
        </a>
        <a href="https://www.twse.com.tw/zh/index.html" target="_blank">
            股市資料平台
        </a>
    </footer>


    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
